services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: finai
      POSTGRES_PASSWORD: finai_secret
      POSTGRES_DB: finai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finai"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql://finai:finai_secret@db:5432/finai
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://finai:finai_secret@db:5432/finai
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin_data:
